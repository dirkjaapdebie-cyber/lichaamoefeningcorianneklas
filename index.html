<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomie Lab - Corianne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #f0f7ff; }
        .medical-card { background: white; border-radius: 2rem; border: 2px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .terminal { font-family: 'Space Mono', monospace; background: #0f172a; color: #4ade80; }
        .admin-hidden { display: none; }
    </style>
</head>
<body class="p-4">

    <div id="setup-screen" class="max-w-md mx-auto medical-card p-10 mt-10 text-center">
        <h1 class="text-3xl font-black text-blue-600 mb-6 uppercase">HET LAB 🩺</h1>
        <div class="space-y-4">
            <input type="text" id="p1-name" placeholder="Naam Vrager" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 ring-blue-500">
            <input type="text" id="p2-name" placeholder="Naam Typer" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 ring-blue-500">
            <button onclick="startApp()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-blue-700">START SPEL</button>
        </div>
        <button onclick="loginAdmin()" class="mt-8 text-slate-300 text-xs hover:text-blue-400">Beheer voor docenten</button>
    </div>

    <div id="game-screen" class="hidden max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 mt-6">
        <div class="medical-card p-8 border-t-[10px] border-amber-400">
            <div class="flex justify-between mb-4 font-bold text-slate-400 uppercase text-xs"><span>Scan resultaat</span><span id="display-p1"></span></div>
            <div class="bg-slate-50 h-64 mb-6 rounded-2xl flex items-center justify-center border-2 border-dashed overflow-hidden">
                <img id="current-image" src="" class="max-h-full max-w-full object-contain">
                <div id="img-error" class="hidden text-rose-500 font-bold text-center p-4">❌ Foto niet gevonden<br><span id="error-filename" class="text-xs font-mono text-slate-400"></span></div>
            </div>
            <div id="live-text-view" class="terminal p-6 rounded-2xl text-3xl text-center min-h-[80px] flex items-center justify-center uppercase">...</div>
            <div id="correction-result" class="mt-4 p-4 rounded-xl font-bold text-center min-h-[60px]"></div>
            <div class="flex justify-center gap-6 mt-6">
                <button onclick="check(true)" class="bg-emerald-500 text-white w-20 h-20 rounded-full text-4xl shadow-lg hover:scale-105 active:scale-95 transition">👍</button>
                <button onclick="check(false)" class="bg-rose-500 text-white w-20 h-20 rounded-full text-4xl shadow-lg hover:scale-105 active:scale-95 transition">👎</button>
            </div>
        </div>

        <div class="medical-card p-8 border-t-[10px] border-blue-500 text-center">
            <div class="flex justify-between mb-4 font-bold text-slate-400 uppercase text-xs"><span>Invoermodule</span><span id="display-p2"></span></div>
            <input type="text" id="main-input" oninput="syncInput()" class="terminal w-full p-8 rounded-3xl text-4xl text-center outline-none border-4 border-slate-800 focus:border-blue-500" placeholder="TYPEN..." autocomplete="off">
            <div id="timer-display" class="mt-12 text-center text-4xl font-mono text-blue-500 font-bold">0s</div>
            <div id="leaderboard-list" class="mt-10 space-y-2"></div>
        </div>
    </div>

    <section id="admin-panel" class="admin-hidden max-w-6xl mx-auto mt-20 p-10 bg-white rounded-[3rem] border-4 border-blue-100 shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight">⚙️ Beheerdersoverzicht</h2>
            <button onclick="logoutAdmin()" class="bg-slate-100 px-4 py-2 rounded-lg font-bold">Sluiten</button>
        </div>
        
        <div class="mb-8 grid grid-cols-2 md:grid-cols-5 gap-4" id="teacher-grid">
            </div>

        <div class="bg-rose-50 p-6 rounded-2xl flex justify-between items-center">
            <p class="text-rose-600 font-bold text-sm uppercase">Gevaarlijke zone</p>
            <button onclick="resetLeaderboard()" class="bg-rose-600 text-white px-6 py-2 rounded-xl font-bold">Leeg het Scorebord</button>
        </div>
    </section>

    <script>
        const bodyParts = [
            { id: "kruin.png", lw: "de", naam: "kruin" },
            { id: "voorhoofd.png", lw: "het", naam: "voorhoofd" },
            { id: "wenkbrauw.png", lw: "de", naam: "wenkbrauw" },
            { id: "oog.png", lw: "het", naam: "oog" },
            { id: "neus.png", lw: "de", naam: "neus" },
            { id: "mond.png", lw: "de", naam: "mond" },
            { id: "keel.png", lw: "de", naam: "keel" },
            { id: "hals.png", lw: "de", naam: "hals" },
            { id: "schouder.png", lw: "de", naam: "schouder" },
            { id: "rug.png", lw: "de", naam: "rug" }
        ];

        let state = { p1: "", p2: "", current: null, startTime: 0 };

        function loginAdmin() {
            const pass = prompt("Voer wachtwoord in:");
            if (pass === "123") {
                document.getElementById('admin-panel').classList.remove('admin-hidden');
                renderTeacher();
                window.scrollTo(0, document.body.scrollHeight);
            } else {
                alert("Fout wachtwoord!");
            }
        }

        function logoutAdmin() {
            document.getElementById('admin-panel').classList.add('admin-hidden');
        }

        function startApp() {
            state.p1 = document.getElementById('p1-name').value;
            state.p2 = document.getElementById('p2-name').value;
            if(!state.p1 || !state.p2) return alert("Namen invullen!");
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-p1').innerText = state.p1;
            document.getElementById('display-p2').innerText = state.p2;
            state.startTime = Date.now();
            setInterval(() => {
                const s = Math.floor((Date.now() - state.startTime) / 1000);
                document.getElementById('timer-display').innerText = s + "s";
            }, 1000);
            nextRound();
        }

        function nextRound() {
            state.current = bodyParts[Math.floor(Math.random() * bodyParts.length)];
            const img = document.getElementById('current-image');
            const err = document.getElementById('img-error');
            const errFile = document.getElementById('error-filename');
            
            img.classList.remove('hidden');
            err.classList.add('hidden');
            
            img.onerror = () => {
                img.classList.add('hidden');
                err.classList.remove('hidden');
                errFile.innerText = "Gezocht naar: " + state.current.id;
            };
            
            img.src = state.current.id + "?t=" + new Date().getTime(); // Anti-cache
            document.getElementById('main-input').value = "";
            document.getElementById('live-text-view').innerText = "...";
            document.getElementById('correction-result').innerText = "";
            document.getElementById('correction-result').className = "";
        }

        function syncInput() { document.getElementById('live-text-view').innerText = document.getElementById('main-input').value; }

        function check(isOk) {
            const typed = document.getElementById('main-input').value.toLowerCase().trim();
            const resBox = document.getElementById('correction-result');
            if(isOk && typed === state.current.naam) {
                const s = Math.floor((Date.now() - state.startTime) / 1000);
                resBox.innerText = `✅ GOED: ${state.current.lw.toUpperCase()} ${state.current.naam.toUpperCase()}`;
                resBox.className = "mt-4 p-4 rounded-xl font-bold text-center bg-emerald-100 text-emerald-700 animate-bounce";
                addLeaderboard(s);
                setTimeout(() => { state.startTime = Date.now(); nextRound(); }, 2000);
            } else {
                resBox.innerText = "❌ KIJK GOED OF PROBEER OPNIEUW";
                resBox.className = "mt-4 p-4 rounded-xl font-bold text-center bg-rose-100 text-rose-700";
            }
        }

        function addLeaderboard(t) {
            const list = document.getElementById('leaderboard-list');
            const row = document.createElement('div');
            row.className = "flex justify-between bg-white p-3 rounded-xl border-2 border-slate-100";
            row.innerHTML = `<span class="font-bold text-slate-700">${state.p1} & ${state.p2}</span><span class="bg-blue-600 text-white px-3 py-1 rounded-lg font-mono font-bold">${t}s</span>`;
            list.prepend(row);
        }

        function resetLeaderboard() {
            document.getElementById('leaderboard-list').innerHTML = "";
        }

        function renderTeacher() {
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = "";
            bodyParts.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-slate-50 p-2 rounded-xl border text-center text-[10px]";
                card.innerHTML = `<img src="${item.id}" class="h-12 w-full object-contain mb-1 bg-white rounded"><span>${item.id}</span>`;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
