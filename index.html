<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomie Lab Firebase - Corianne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #f0f7ff; }
        .medical-card { background: white; border-radius: 2rem; border: 4px solid #e2e8f0; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .terminal { font-family: 'Space Mono', monospace; background: #0f172a; color: #4ade80; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

    <div id="setup-screen" class="max-w-md mx-auto medical-card p-10 mt-10 text-center">
        <h1 class="text-3xl font-black text-blue-600 mb-6 uppercase">HET LAB 🩺</h1>
        <p class="mb-6 text-slate-500 font-bold">Klas: Corianne</p>
        <div class="space-y-4">
            <input type="text" id="user-name" placeholder="Je Naam" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 ring-blue-500">
            <button onclick="joinLab()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-blue-700 transition">INLOGGEN</button>
        </div>
        <div id="status-msg" class="mt-4 text-sm text-blue-400"></div>
    </div>

    <div id="game-screen" class="hidden max-w-4xl mx-auto mt-6">
        <div class="grid grid-cols-1 gap-6">
            
            <div id="role-header" class="text-center p-4 rounded-2xl text-white font-black uppercase tracking-widest shadow-lg">
                LADEN...
            </div>

            <div class="medical-card p-8 relative">
                <div id="view-looker" class="hidden space-y-6">
                    <div class="flex justify-between items-center text-xs font-bold text-slate-400 uppercase">
                        <span>Jij bent de Scanner</span>
                        <span id="partner-name-display"></span>
                    </div>
                    <div class="bg-slate-50 h-80 rounded-3xl flex items-center justify-center border-4 border-dashed border-slate-200 overflow-hidden">
                        <img id="current-image" src="" class="max-h-full max-w-full object-contain">
                    </div>
                    <p class="text-center text-xl font-bold text-blue-800 animate-pulse">VERTEL WAT JE ZIET!</p>
                </div>

                <div id="view-typer" class="hidden space-y-6">
                    <div class="flex justify-between items-center text-xs font-bold text-slate-400 uppercase">
                        <span>Jij bent de Typer</span>
                        <span>Typ wat je hoort</span>
                    </div>
                    <div class="terminal p-10 rounded-3xl">
                        <input type="text" id="main-input" oninput="checkWord()" class="w-full bg-transparent text-5xl text-center outline-none uppercase font-bold" placeholder="..." autocomplete="off">
                    </div>
                    <p class="text-center text-slate-400 font-bold">Wacht op instructies van je partner</p>
                </div>

                <div id="feedback" class="mt-6 text-center text-2xl font-black uppercase min-h-[40px]"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBC3Dzm8PNPXw12VJNimvly5u2I93QeW54",
            authDomain: "schatgravers15maart2026.firebaseapp.com",
            databaseURL: "https://schatgravers15maart2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "schatgravers15maart2026",
            storageBucket: "schatgravers15maart2026.firebasestorage.app",
            messagingSenderId: "30561512857",
            appId: "1:30561512857:web:fcb7868b87d292d1c97708"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const labRef = ref(db, 'labs/corianne');

        const bodyParts = [
            { id: "kruin.png", naam: "kruin" },
            { id: "voorhoofd.png", naam: "voorhoofd" },
            { id: "wenkbrauw.png", naam: "wenkbrauw" },
            { id: "oog.png", naam: "oog" },
            { id: "neus.png", naam: "neus" },
            { id: "mond.png", naam: "mond" },
            { id: "keel.png", naam: "keel" }
        ];

        let myId = null;
        let myName = "";
        let currentRole = "";
        let currentItem = null;

        window.joinLab = function() {
            myName = document.getElementById('user-name').value;
            if(!myName) return alert("Naam?");
            
            myId = push(ref(db, 'labs/corianne/players')).key;
            set(ref(db, `labs/corianne/players/${myId}`), { name: myName, active: true });
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('status-msg').innerText = "Verbonden...";
            
            listenToGame();
        };

        function listenToGame() {
            onValue(labRef, (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                const players = Object.keys(data.players || {});
                
                // Koppeling: Speler 1 is Kijker, Speler 2 is Typer (of andersom)
                if(players.length >= 2) {
                    const isEven = players.indexOf(myId) % 2 === 0;
                    // De 'turn' bepaalt wie kijker is. Als turn 0 is, is Speler 1 de kijker.
                    const turn = data.gameState?.turn || 0;
                    const role = (isEven && turn % 2 === 0) || (!isEven && turn % 2 !== 0) ? 'looker' : 'typer';
                    
                    updateUI(role, data.gameState?.currentItem);
                } else {
                    document.getElementById('role-header').innerText = "WACHTEN OP PARTNER...";
                    document.getElementById('role-header').className = "text-center p-4 rounded-2xl bg-slate-400 text-white font-black";
                }
            });
        }

        function updateUI(role, item) {
            currentRole = role;
            currentItem = item;
            
            const header = document.getElementById('role-header');
            const lookerView = document.getElementById('view-looker');
            const typerView = document.getElementById('view-typer');

            if(role === 'looker') {
                header.innerText = "Jij ziet de scan 🔍";
                header.className = "text-center p-4 rounded-2xl bg-amber-500 text-white font-black shadow-lg";
                lookerView.classList.remove('hidden');
                typerView.classList.add('hidden');
                if(item) document.getElementById('current-image').src = item.id;
            } else {
                header.innerText = "Jij moet typen ⌨️";
                header.className = "text-center p-4 rounded-2xl bg-blue-600 text-white font-black shadow-lg";
                lookerView.classList.add('hidden');
                typerView.classList.remove('hidden');
                document.getElementById('main-input').focus();
            }
            
            // Als er nog geen item is en ik ben de kijker, kies er een
            if(!item && role === 'looker') {
                pickNewItem();
            }
        }

        function pickNewItem() {
            const newItem = bodyParts[Math.floor(Math.random() * bodyParts.length)];
            update(ref(db, 'labs/corianne/gameState'), {
                currentItem: newItem,
                feedback: ""
            });
        }

        window.checkWord = function() {
            if(currentRole !== 'typer') return;
            const input = document.getElementById('main-input').value.toLowerCase().trim();
            
            if(input === currentItem.naam) {
                // Correct! Update de database voor BEIDE spelers
                const currentTurn = (currentItem.turn || 0);
                update(ref(db, 'labs/corianne/gameState'), {
                    feedback: "✅ GOED ZO!",
                    lastWord: currentItem.naam
                });

                // Wacht even en wissel dan de rollen (turn + 1)
                setTimeout(() => {
                    onValue(ref(db, 'labs/corianne/gameState/turn'), (snap) => {
                        const nextTurn = (snap.val() || 0) + 1;
                        update(ref(db, 'labs/corianne/gameState'), {
                            turn: nextTurn,
                            currentItem: bodyParts[Math.floor(Math.random() * bodyParts.length)],
                            feedback: ""
                        });
                    }, { onlyOnce: true });
                    document.getElementById('main-input').value = "";
                }, 2000);
            }
        };

        // Luister naar feedback (voor de animatie)
        onValue(ref(db, 'labs/corianne/gameState/feedback'), (snap) => {
            const fbDiv = document.getElementById('feedback');
            fbDiv.innerText = snap.val() || "";
            fbDiv.className = snap.val() ? "mt-6 text-center text-2xl font-black uppercase text-emerald-500 animate-bounce" : "";
        });

    </script>
</body>
</html>
