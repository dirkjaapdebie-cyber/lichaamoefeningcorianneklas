<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomie Lab Pro - Corianne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #f0f7ff; }
        .medical-card { background: white; border-radius: 2rem; border: 4px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .terminal { font-family: 'Space Mono', monospace; background: #0f172a; color: #4ade80; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

    <div id="setup-screen" class="max-w-md mx-auto medical-card p-10 mt-10 text-center">
        <h1 class="text-3xl font-black text-blue-600 mb-2 uppercase tracking-tighter">HET LAB 🩺</h1>
        <p class="text-slate-400 mb-8 font-bold text-xs uppercase tracking-[0.2em]">KLAS: CORIANNE</p>
        
        <div id="login-fields" class="space-y-4">
            <input type="text" id="user-name" placeholder="Je Voornaam" class="w-full p-4 border-2 rounded-2xl outline-none focus:border-blue-500 text-center text-xl font-bold">
            <button onclick="joinMatchmaking()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-blue-700 shadow-lg active:scale-95 transition-all">ZOEK PARTNER</button>
        </div>

        <div id="waiting-area" class="hidden mt-6 p-6 bg-blue-50 rounded-2xl border-2 border-blue-100">
            <div class="flex justify-center mb-4">
                <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <p class="text-blue-600 font-black uppercase text-sm italic">Wachten op een klasgenoot...</p>
        </div>
        
        <button onclick="loginAdmin()" class="mt-12 text-slate-300 text-xs hover:text-blue-500 uppercase font-bold tracking-widest">Docenten Login</button>
    </div>

    <div id="game-screen" class="hidden max-w-4xl mx-auto mt-6">
        <div class="flex justify-between items-center mb-6 px-4">
            <div class="bg-white px-6 py-2 rounded-full border-2 border-blue-100 font-bold text-blue-600 shadow-sm text-sm">
                👥 <span id="team-names">...</span> | ⭐ <span id="score-display">0</span>
            </div>
            <div id="role-label" class="px-8 py-2 rounded-full font-black text-white uppercase tracking-widest shadow-md text-sm">LADEN...</div>
        </div>

        <div class="medical-card p-8 relative overflow-hidden">
            <div id="view-looker" class="hidden space-y-6 text-center">
                <div class="bg-slate-50 h-80 rounded-[2rem] flex items-center justify-center border-4 border-dashed border-slate-200 overflow-hidden shadow-inner">
                    <img id="current-image" src="" class="max-h-full max-w-full object-contain">
                </div>
                <p class="mt-8 text-2xl font-black text-blue-800 animate-pulse uppercase">Beschrijf de foto!</p>
            </div>

            <div id="view-typer" class="hidden space-y-6 text-center">
                <div class="terminal p-12 rounded-[2rem] shadow-2xl">
                    <input type="text" id="main-input" oninput="handleTyping()" class="w-full bg-transparent text-6xl text-center outline-none uppercase font-bold" placeholder="..." autocomplete="off">
                </div>
                <p class="mt-8 text-xl font-bold text-slate-500 uppercase tracking-tight">Luister naar je partner</p>
            </div>

            <div id="feedback" class="hidden absolute inset-0 bg-white/95 flex items-center justify-center text-center z-50">
                <div class="animate-bounce">
                    <div class="text-9xl mb-4">🧠</div>
                    <div class="text-5xl font-black text-emerald-500 uppercase">GOED!</div>
                    <div class="text-slate-400 font-bold mt-2">ROLLEN WISSELEN...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden max-w-6xl mx-auto mt-10 p-10 bg-white rounded-[3rem] border-4 border-blue-100 shadow-2xl">
        <div class="flex justify-between items-center mb-10 border-b pb-6">
            <div>
                <h2 class="text-3xl font-black text-slate-800 uppercase tracking-tighter">BEHEERDER DASHBOARD</h2>
                <p class="text-blue-500 font-bold">Klas: Corianne</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-800 text-white px-8 py-3 rounded-2xl font-bold hover:bg-black transition-all">LOGOUT</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="space-y-6">
                <div class="bg-blue-50 p-8 rounded-[2rem] border-2 border-blue-100">
                    <h3 class="text-xl font-black mb-6 uppercase text-blue-800">Nieuw Lichaamsdeel</h3>
                    <div class="space-y-4">
                        <input type="text" id="adm-img" placeholder="Bestandsnaam (bv: neus.png)" class="w-full p-4 border-2 rounded-2xl outline-none focus:border-blue-500">
                        <input type="text" id="adm-name" placeholder="Het woord (bv: neus)" class="w-full p-4 border-2 rounded-2xl outline-none focus:border-blue-500">
                        <button onclick="adminAddPart()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg">VOEG TOE AAN LAB</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] border-2">
                    <h3 class="font-black mb-4 uppercase text-slate-400 tracking-widest text-sm">Huidige Database (<span id="part-count">0</span>)</h3>
                    <div id="admin-parts-list" class="grid grid-cols-1 gap-2 max-h-[400px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-emerald-50 p-8 rounded-[2rem] border-2 border-emerald-100">
                    <h3 class="text-xl font-black mb-6 uppercase text-emerald-800">Live Klas Resultaten 📊</h3>
                    <div id="admin-leaderboard" class="space-y-3">
                        </div>
                </div>

                <div class="p-6 bg-rose-50 rounded-2xl border-2 border-rose-100">
                    <h3 class="text-rose-600 font-bold mb-2 uppercase text-xs">Gevaarlijke Zone</h3>
                    <button onclick="resetEverything()" class="bg-white text-rose-600 border-2 border-rose-600 px-4 py-2 rounded-xl font-bold text-xs hover:bg-rose-600 hover:text-white transition-all w-full">RESET ALLE SCORES & TEAMS</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBC3Dzm8PNPXw12VJNimvly5u2I93QeW54",
            authDomain: "schatgravers15maart2026.firebaseapp.com",
            databaseURL: "https://schatgravers15maart2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "schatgravers15maart2026",
            storageBucket: "schatgravers15maart2026.firebasestorage.app",
            messagingSenderId: "30561512857",
            appId: "1:30561512857:web:fcb7868b87d292d1c97708"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let myName = "", myId = "", teamId = "", currentRole = "", currentItem = null, allParts = [];

        // --- MATCHMAKING ---
        window.joinMatchmaking = function() {
            myName = document.getElementById('user-name').value.trim();
            if(!myName) return alert("Typ je naam!");
            
            document.getElementById('login-fields').classList.add('hidden');
            document.getElementById('waiting-area').classList.remove('hidden');

            const waitingRef = ref(db, 'labs/corianne/waiting');
            onValue(waitingRef, (snap) => {
                const waitingPlayer = snap.val();
                if(!waitingPlayer) {
                    set(waitingRef, { name: myName, id: 'p1' });
                } else if(waitingPlayer.name !== myName && !teamId) {
                    const newTeamId = "team_" + Date.now();
                    const newTeam = { players: { p1: waitingPlayer.name, p2: myName }, score: 0, turn: 0 };
                    set(ref(db, 'labs/corianne/teams/' + newTeamId), newTeam);
                    remove(waitingRef);
                    startTeamGame(newTeamId, "p2");
                }
            });

            onValue(ref(db, 'labs/corianne/teams'), (snap) => {
                const teams = snap.val();
                for(let id in teams) {
                    if(teams[id].players.p1 === myName && !teamId) startTeamGame(id, "p1");
                }
            });
        };

        function startTeamGame(tId, pId) {
            teamId = tId; myId = pId;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            onValue(ref(db, 'labs/corianne/parts'), (s) => {
                allParts = Object.values(s.val() || []);
                listenToTeam();
            });
        }

        function listenToTeam() {
            onValue(ref(db, 'labs/corianne/teams/' + teamId), (snap) => {
                const data = snap.val();
                if(!data || allParts.length === 0) return;
                document.getElementById('team-names').innerText = `${data.players.p1} & ${data.players.p2}`;
                document.getElementById('score-display').innerText = data.score;
                currentRole = (data.turn % 2 === 0) ? (myId === 'p1' ? 'looker' : 'typer') : (myId === 'p1' ? 'typer' : 'looker');
                if(!data.currentItem && currentRole === "looker") {
                    update(ref(db, 'labs/corianne/teams/' + teamId), { currentItem: allParts[Math.floor(Math.random() * allParts.length)] });
                }
                currentItem = data.currentItem;
                renderRole();
            });
        }

        function renderRole() {
            const b = document.getElementById('role-label');
            document.getElementById('feedback').classList.add('hidden');
            if(currentRole === "looker") {
                b.innerText = "Scanner 🔍"; b.className = "px-8 py-2 rounded-full font-black text-white bg-amber-500 shadow-md";
                document.getElementById('view-looker').classList.remove('hidden');
                document.getElementById('view-typer').classList.add('hidden');
                if(currentItem) document.getElementById('current-image').src = currentItem.id;
            } else {
                b.innerText = "Typer ⌨️"; b.className = "px-8 py-2 rounded-full font-black text-white bg-blue-600 shadow-md";
                document.getElementById('view-looker').classList.add('hidden');
                document.getElementById('view-typer').classList.remove('hidden');
                document.getElementById('main-input').focus();
            }
        }

        window.handleTyping = function() {
            const val = document.getElementById('main-input').value.toLowerCase().trim();
            if(currentItem && val === currentItem.naam) {
                document.getElementById('feedback').classList.remove('hidden');
                setTimeout(() => {
                    onValue(ref(db, 'labs/corianne/teams/' + teamId), (snap) => {
                        const d = snap.val();
                        update(ref(db, 'labs/corianne/teams/' + teamId), {
                            score: d.score + 1,
                            turn: d.turn + 1,
                            currentItem: null
                        });
                    }, { onlyOnce: true });
                    document.getElementById('main-input').value = "";
                }, 1500);
            }
        };

        // --- ADMIN ---
        window.loginAdmin = function() {
            if(prompt("Wachtwoord docent?") === "123") {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadAdminTools();
            }
        };

        function loadAdminTools() {
            // Live Woordenlijst Beheer
            onValue(ref(db, 'labs/corianne/parts'), (snap) => {
                const list = document.getElementById('admin-parts-list');
                const count = document.getElementById('part-count');
                list.innerHTML = "";
                const data = snap.val() || {};
                const entries = Object.entries(data);
                count.innerText = entries.length;
                entries.forEach(([key, val]) => {
                    list.innerHTML += `
                        <div class="flex items-center justify-between bg-white border-2 p-3 rounded-2xl hover:border-blue-300 transition-all group">
                            <div class="flex items-center gap-3">
                                <img src="${val.id}" class="w-10 h-10 rounded-lg object-contain bg-slate-50 border">
                                <span class="font-bold text-slate-700 uppercase text-sm">${val.naam}</span>
                            </div>
                            <button onclick="deletePart('${key}')" class="bg-rose-50 text-rose-500 p-2 rounded-xl opacity-0 group-hover:opacity-100 hover:bg-rose-500 hover:text-white transition-all font-bold text-xs">VERWIJDER</button>
                        </div>
                    `;
                });
            });

            // Live Team Monitor
            onValue(ref(db, 'labs/corianne/teams'), (snap) => {
                const lb = document.getElementById('admin-leaderboard');
                lb.innerHTML = "";
                const teams = snap.val() || {};
                Object.values(teams).sort((a,b) => b.score - a.score).forEach(t => {
                    lb.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border-2 border-emerald-100">
                            <span class="font-black text-emerald-800 uppercase text-xs tracking-tighter">${t.players.p1} & ${t.players.p2}</span>
                            <span class="bg-emerald-500 text-white px-4 py-1 rounded-full font-mono font-bold">${t.score}</span>
                        </div>
                    `;
                });
            });
        }

        window.adminAddPart = function() {
            const img = document.getElementById('adm-img').value;
            const name = document.getElementById('adm-name').value.toLowerCase().trim();
            if(!img || !name) return alert("Vul beide velden in!");
            push(ref(db, 'labs/corianne/parts'), { id: img, naam: name });
            document.getElementById('adm-img').value = ""; document.getElementById('adm-name').value = "";
        };

        window.deletePart = function(key) {
            if(confirm("Dit woord verwijderen uit het spel?")) remove(ref(db, 'labs/corianne/parts/' + key));
        };

        window.resetEverything = function() {
            if(confirm("DIT VERWIJDERT ALLE TEAMS EN SCORES. De woordenlijst blijft staan. Doorgaan?")) {
                remove(ref(db, 'labs/corianne/teams'));
                remove(ref(db, 'labs/corianne/waiting'));
                alert("Alles is gereset!");
            }
        }
    </script>
</body>
</html>
