<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medisch Lab Corianne - Anatomie Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #f0f9ff; }
        .medical-card { background: white; border: 2px solid #e2e8f0; border-radius: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .type-terminal { font-family: 'Space Mono', monospace; background: #0f172a; color: #4ade80; }
        .admin-section { background: #f8fafc; border-top: 6px solid #3b82f6; }
        .img-preview-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; border: 2px solid #cbd5e1; }
    </style>
</head>
<body class="p-4">

    <header class="max-w-5xl mx-auto text-center py-6">
        <div class="inline-block bg-blue-600 text-white px-6 py-1 rounded-full text-sm font-bold shadow-md mb-2">🏥 MEDISCH TRAININGSCENTRUM</div>
        <h1 class="text-4xl font-black text-slate-800">Anatomie Lab</h1>
    </header>

    <div id="setup-screen" class="max-w-md mx-auto medical-card p-10 mt-10">
        <h2 class="text-2xl font-bold text-center text-slate-700 mb-6">Start Nieuw Onderzoek</h2>
        <input type="text" id="p1-name" placeholder="Naam Leerling 1 (Vrager)" class="w-full p-4 border rounded-2xl mb-4 outline-none focus:ring-2 ring-blue-400">
        <input type="text" id="p2-name" placeholder="Naam Leerling 2 (Typer)" class="w-full p-4 border rounded-2xl mb-6 outline-none focus:ring-2 ring-blue-400">
        <button onclick="startApp()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-blue-700 shadow-lg">START 🚀</button>
    </div>

    <div id="game-screen" class="hidden max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 mt-6">
        <div class="medical-card p-8 border-t-[10px] border-amber-400">
            <div class="flex justify-between items-center mb-4"><span class="font-bold text-slate-400">DIAGNOSE UNIT</span><span id="display-p1" class="font-black"></span></div>
            <div class="bg-slate-50 p-4 rounded-3xl flex justify-center mb-6 border-2 border-dashed">
                <img id="current-image" src="" class="max-h-64 object-contain rounded-xl">
            </div>
            <div id="live-text-view" class="type-terminal p-6 rounded-2xl text-3xl text-center min-h-[80px] flex items-center justify-center border-4 border-slate-700 uppercase tracking-widest">...</div>
            <div id="correction-result" class="mt-4 p-4 rounded-xl font-bold text-center min-h-[60px]"></div>
            <div class="flex justify-center gap-6 mt-6">
                <button onclick="check(true)" class="bg-emerald-500 text-white w-20 h-20 rounded-full text-3xl shadow-lg hover:scale-105 transition">👍</button>
                <button onclick="check(false)" class="bg-rose-500 text-white w-20 h-20 rounded-full text-3xl shadow-lg hover:scale-105 transition">👎</button>
            </div>
        </div>

        <div class="medical-card p-8 border-t-[10px] border-blue-500">
            <div class="flex justify-between items-center mb-4"><span class="font-bold text-slate-400">INPUT TERMINAL</span><span id="display-p2" class="font-black"></span></div>
            <p class="text-slate-500 font-bold mb-4">Voer de benaming in:</p>
            <input type="text" id="main-input" oninput="syncInput()" class="type-terminal w-full p-8 rounded-3xl text-4xl text-center outline-none border-4 border-slate-800 focus:border-blue-400" autocomplete="off">
            <div id="timer-display" class="mt-12 text-center text-2xl font-mono text-blue-500">Tijd: 00s</div>
        </div>
    </div>

    <section class="max-w-6xl mx-auto mt-24 p-10 admin-section rounded-[3rem] shadow-xl">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-3xl font-black text-slate-800">⚙️ Mediabibliotheek & Instellingen</h2>
                <p class="text-slate-500 font-medium">Beheer afbeeldingen, lidwoorden en namen voor de vragen.</p>
            </div>
            <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-bold">
                Totaal: <span id="total-count">0</span> woorden
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-blue-200 mb-10">
            <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2"><span>➕</span> Nieuwe vraag toevoegen</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="new-lw" class="p-3 border rounded-xl outline-none focus:border-blue-400">
                    <option value="de">de</option>
                    <option value="het">het</option>
                </select>
                <input type="text" id="new-name" placeholder="Woord (bijv. knie)" class="p-3 border rounded-xl outline-none focus:border-blue-400">
                <input type="file" id="new-file" accept="image/*" class="p-2 text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <button onclick="addNewWord()" class="bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">Voeg toe aan sessie</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="teacher-grid">
            </div>
    </section>

    <script>
        // Database
        let bodyParts = [
            { id: "arm", lw: "de", naam: "arm", src: "beelden/arm.png" }, { id: "been", lw: "het", naam: "been", src: "beelden/been.png" },
            { id: "billen", lw: "de", naam: "billen", src: "beelden/billen.png" }, { id: "buik", lw: "de", naam: "buik", src: "beelden/buik.png" },
            { id: "gebit", lw: "het", naam: "gebit", src: "beelden/gebit.png" }, { id: "haar", lw: "het", naam: "haar", src: "beelden/haar.png" },
            { id: "hals", lw: "de", naam: "hals", src: "beelden/hals.png" }, { id: "hand", lw: "de", naam: "hand", src: "beelden/hand.png" },
            { id: "hart", lw: "het", naam: "hart", src: "beelden/hart.png" }, { id: "hersenen", lw: "de", naam: "hersenen", src: "beelden/hersenen.png" },
            { id: "heup", lw: "de", naam: "heup", src: "beelden/heup.png" }, { id: "hiel", lw: "de", naam: "hiel", src: "beelden/hiel.png" },
            { id: "keel", lw: "de", naam: "keel", src: "beelden/keel.png" }, { id: "kies", lw: "de", naam: "kies", src: "beelden/kies.png" },
            { id: "knie", lw: "de", naam: "knie", src: "beelden/knie.png" }, { id: "kruin", lw: "de", naam: "kruin", src: "beelden/kruin.png" },
            { id: "longen", lw: "de", naam: "longen", src: "beelden/longen.png" }, { id: "mond", lw: "de", naam: "mond", src: "beelden/mond.png" },
            { id: "nagel", lw: "de", naam: "nagel", src: "beelden/nagel.png" }, { id: "navel", lw: "de", naam: "navel", src: "beelden/navel.png" },
            { id: "neus", lw: "de", naam: "neus", src: "beelden/neus.png" }, { id: "nies", lw: "de", naam: "nies", src: "beelden/nies.png" },
            { id: "oog", lw: "het", naam: "oog", src: "beelden/oog.png" }, { id: "pillen", lw: "de", naam: "pillen", src: "beelden/pillen.png" },
            { id: "rug", lw: "de", naam: "rug", src: "beelden/rug.png" }, { id: "schouder", lw: "de", naam: "schouder", src: "beelden/schouder.png" },
            { id: "schouder1", lw: "de", naam: "schouder", src: "beelden/schouder1.png" }, { id: "teen", lw: "de", naam: "teen", src: "beelden/teen.png" },
            { id: "tong", lw: "de", naam: "tong", src: "beelden/tong.png" }
        ];

        let state = { p1: "", p2: "", current: null, startTime: 0, timer: null };

        // --- SPEL LOGICA ---
        function startApp() {
            state.p1 = document.getElementById('p1-name').value;
            state.p2 = document.getElementById('p2-name').value;
            if(!state.p1 || !state.p2) return alert("Namen invullen!");
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-p1').innerText = state.p1.toUpperCase();
            document.getElementById('display-p2').innerText = state.p2.toUpperCase();
            state.startTime = Date.now();
            runTimer(); nextRound();
        }

        function runTimer() {
            state.timer = setInterval(() => {
                const s = Math.floor((Date.now() - state.startTime) / 1000);
                document.getElementById('timer-display').innerText = `Tijd: ${s}s`;
            }, 1000);
        }

        function nextRound() {
            state.current = bodyParts[Math.floor(Math.random() * bodyParts.length)];
            document.getElementById('current-image').src = state.current.src;
            document.getElementById('main-input').value = "";
            document.getElementById('live-text-view').innerText = "...";
            document.getElementById('correction-result').innerText = "";
            document.getElementById('correction-result').className = "";
        }

        function syncInput() { document.getElementById('live-text-view').innerText = document.getElementById('main-input').value; }

        function check(isOk) {
            const typed = document.getElementById('main-input').value.toLowerCase().trim();
            const resBox = document.getElementById('correction-result');
            if(isOk && typed === state.current.naam) {
                resBox.innerText = `✅ CORRECT: ${state.current.lw.toUpperCase()} ${state.current.naam.toUpperCase()}`;
                resBox.className = "mt-4 p-4 rounded-xl font-bold text-center bg-emerald-100 text-emerald-700 animate-bounce";
                setTimeout(() => { state.startTime = Date.now(); nextRound(); }, 2000);
            } else {
                resBox.innerText = "❌ KIJK GOED OF TYP OPNIEUW";
                resBox.className = "mt-4 p-4 rounded-xl font-bold text-center bg-rose-100 text-rose-700";
            }
        }

        // --- DOCENTEN LOGICA ---
        function renderTeacherPanel() {
            const grid = document.getElementById('teacher-grid');
            grid.innerHTML = "";
            document.getElementById('total-count').innerText = bodyParts.length;

            bodyParts.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border flex items-center gap-4";
                card.innerHTML = `
                    <img src="${item.src}" class="img-preview-thumb" onerror="this.src='https://via.placeholder.com/60?text=Error'">
                    <div class="flex-1">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">${item.id}</p>
                        <div class="flex gap-1 mt-1">
                            <input type="text" value="${item.lw}" onchange="updateData(${index}, 'lw', this.value)" class="w-10 p-1 border rounded text-xs text-center font-bold">
                            <input type="text" value="${item.naam}" onchange="updateData(${index}, 'naam', this.value)" class="flex-1 p-1 border rounded text-xs font-bold">
                            <button onclick="removeWord(${index})" class="text-rose-500 p-1">🗑️</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function addNewWord() {
            const lw = document.getElementById('new-lw').value;
            const name = document.getElementById('new-name').value.trim().toLowerCase();
            const fileInput = document.getElementById('new-file');

            if(!name || !fileInput.files[0]) return alert("Vul een naam in en kies een foto!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const newObj = {
                    id: name + "_" + Date.now(),
                    lw: lw,
                    naam: name,
                    src: e.target.result // Dit is een data-URL van de geüploade foto
                };
                bodyParts.push(newObj);
                renderTeacherPanel();
                alert("Foto toegevoegd aan de sessie!");
                document.getElementById('new-name').value = "";
                fileInput.value = "";
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        window.updateData = (idx, field, val) => { bodyParts[idx][field] = val.toLowerCase().trim(); };
        window.removeWord = (idx) => { if(confirm("Verwijderen?")) { bodyParts.splice(idx, 1); renderTeacherPanel(); } };

        renderTeacherPanel();
    </script>
</body>
</html>
